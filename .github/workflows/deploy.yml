name: Deploy to GitHub Pages (gh-pages branch)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: erp-lead-management/package-lock.json

      - name: Install dependencies
        working-directory: ./erp-lead-management
        run: npm install

      - name: Build
        working-directory: ./erp-lead-management
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./erp-lead-management/dist

